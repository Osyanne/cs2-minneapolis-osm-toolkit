name: City Request
description: Request a new city for the CS2 OSM Toolkit
title: "[City Request] "
labels: ["city-request"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for requesting a city! Please fill in every field carefully — incomplete
        requests get queued behind well-specified ones.

        **Scope (current):** City requests cover the **Zoning module only**. Vial (road network)
        and Services (hospitals/schools/parks) are temporarily paused for new requests while
        we focus on broadening the zoning coverage. Existing cities keep their full modules.

        **Turnaround:** 30–60 min after acceptance for zoning when actively maintaining.

        **If this tool is useful to you, a ⭐ on the repo keeps city-request turnaround active.**
        (Not required — your request will be processed either way.)

  - type: input
    id: display_name
    attributes:
      label: City display name
      description: "Full name as it should appear on the landing page (e.g. 'Charleston, SC' or 'São Paulo, Brazil')."
      placeholder: "Charleston, SC"
    validations:
      required: true

  - type: input
    id: slug
    attributes:
      label: Proposed slug
      description: |
        URL identifier — lowercase letters, numbers, and underscores only. No accents,
        spaces, or hyphens (use `_` instead). This becomes part of the URL: `map.html?city=YOUR_SLUG`.
      placeholder: "charleston"
    validations:
      required: true

  - type: input
    id: country
    attributes:
      label: Country / region
      placeholder: "USA"
    validations:
      required: true

  - type: input
    id: bbox
    attributes:
      label: Bounding box (4 decimal numbers, comma-separated)
      description: |
        **Format:** `south,west,north,east` — exactly 4 decimal degrees, comma-separated, no spaces.

        - `south` = southern latitude (smaller number)
        - `west` = western longitude (more negative for the Americas)
        - `north` = northern latitude (larger number)
        - `east` = eastern longitude (less negative for the Americas)

        **Size guidance:** Aim for ~0.10° to 0.20° per side (roughly 10–20 km). That's the scale
        of one CS2 playable area. Larger bboxes take much longer to extract and include irrelevant suburbs/water.

        **How to get one visually:**
        1. Open [bboxfinder.com](http://bboxfinder.com/) and draw a rectangle around your city.
        2. Copy the result from the **"Lat / Lng"** box (NOT the "Decimal" box — that one is `west,south,east,north` and will trip you up).
        3. Paste into the field below.

        **Example (Madison, WI):** `43.030,-89.500,43.130,-89.300`
      placeholder: "32.74,-80.05,32.92,-79.85"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why this city?
      description: "Tell us briefly: interesting urban form, you're building it in CS2, local request, etc. One or two sentences is fine."
      placeholder: "Historic peninsula bordered by two rivers, want to build it in CS2 with real street grid."
    validations:
      required: true

  - type: checkboxes
    id: modules
    attributes:
      label: Module
      description: |
        New city requests currently ship with **Zoning only**. This is the toolkit's core
        module — fast to generate and covers ~95% of the value (residential/commercial/office/
        industrial/parking subtypes aligned to CS2's zoning model).

        Vial (road network) and Services (hospitals/schools/parks) are temporarily paused for
        new cities. Watch the repo for when they reopen.
      options:
        - label: Zoning (included by default)
          required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Pre-submit checklist
      options:
        - label: I verified my bbox has exactly 4 comma-separated decimal numbers
          required: true
        - label: I verified my bbox is in `south,west,north,east` order (NOT bboxfinder's "Decimal" output)
          required: true
        - label: My bbox is roughly 0.10°–0.20° per side (not the whole metro area)
          required: true
