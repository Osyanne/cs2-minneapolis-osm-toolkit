# New York City Zoning — NYC Zoning Resolution
# Source: NYC Department of City Planning Zoning Districts (ZoLA shapefile)
# Reference: https://www1.nyc.gov/site/planning/zoning/glossary.page
# Notes: NYC codes follow pattern <PREFIX><DIGIT>[-<SUBDISTRICT>]. We map by
# prefix+digit; subdistricts (X-1, X-2, …) share the same CS2 zone.
city: new_york
source_url: https://www1.nyc.gov/site/planning/data-maps/open-data.page
source_field: ZONEDIST
crs_in: EPSG:2263
last_validated: 2026-05-24
